---
- name: Configure Minecraft Server
  hosts: minecraft
  become: true

  vars:
    minecraft_dir: /opt/minecraft
    minecraft_user: minecraft
    minecraft_server_url: "https://piston-data.mojang.com/v1/objects/e6ec2f64e6080b9b5d9b471b291c33cc7f509733/server.jar"

  tasks:
    - name: Update apt cache
      apt:
        update_cache: true

    - name: Install required packages
      apt:
        name:
          - openjdk-21-jre-headless
          - wget
          - curl
        state: present

    - name: Create minecraft system user
      user:
        name: "{{ minecraft_user }}"
        system: true
        shell: /usr/sbin/nologin
        home: "{{ minecraft_dir }}"
        create_home: false

    - name: Create Minecraft directory
      file:
        path: "{{ minecraft_dir }}"
        state: directory
        owner: "{{ minecraft_user }}"
        group: "{{ minecraft_user }}"
        mode: "0755"

    - name: Download Minecraft server jar
      get_url:
        url: "{{ minecraft_server_url }}"
        dest: "{{ minecraft_dir }}/server.jar"
        owner: "{{ minecraft_user }}"
        group: "{{ minecraft_user }}"
        mode: "0644"

    - name: Accept Minecraft EULA
      copy:
        dest: "{{ minecraft_dir }}/eula.txt"
        content: "eula=true\n"
        owner: "{{ minecraft_user }}"
        group: "{{ minecraft_user }}"
        mode: "0644"

    - name: Create server.properties
      copy:
        dest: "{{ minecraft_dir }}/server.properties"
        owner: "{{ minecraft_user }}"
        group: "{{ minecraft_user }}"
        mode: "0644"
        content: |
          server-port=25565
          query.port=25565
          enable-query=true
          motd=CS312 Automated Minecraft Server
          difficulty=easy
          gamemode=survival
          online-mode=true
          max-players=20
          view-distance=8
          simulation-distance=6

    - name: Install systemd service
      template:
        src: templates/minecraft.service.j2
        dest: /etc/systemd/system/minecraft.service
        owner: root
        group: root
        mode: "0644"

    - name: Reload systemd
      systemd:
        daemon_reload: true

    - name: Enable and start Minecraft service
      systemd:
        name: minecraft
        enabled: true
        state: restarted